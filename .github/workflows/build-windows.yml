name: Build Windows Installer

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt pyinstaller

      - name: Download ffmpeg
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg-tmp
          New-Item -ItemType Directory -Force -Path dist-ffmpeg | Out-Null
          Copy-Item (Get-ChildItem ffmpeg-tmp -Recurse -Filter ffmpeg.exe | Select-Object -First 1).FullName dist-ffmpeg/
          Copy-Item (Get-ChildItem ffmpeg-tmp -Recurse -Filter ffprobe.exe | Select-Object -First 1).FullName dist-ffmpeg/

      - name: Build app (PyInstaller)
        run: pyinstaller packaging/steadytranscribe.spec --distpath dist

      - name: Bundle ffmpeg into app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/SteadyTranscribe/ffmpeg | Out-Null
          Copy-Item dist-ffmpeg/* dist/SteadyTranscribe/ffmpeg/

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" packaging\installer.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SteadyTranscribe-Setup
          path: packaging/Output/*.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/Output/*.exe
