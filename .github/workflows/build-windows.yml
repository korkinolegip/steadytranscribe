name: Build Windows Installer

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ЗАЩИТА ЦЕПОЧКИ ОБНОВЛЕНИЙ: версии везде совпадают, контракты не тронуты.
      # Иначе сборка не выпустится — обновления у пользователей не сломаются.
      - name: Контроль версий и контрактов автообновления
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PY=$(grep -oP 'CURRENT_VERSION = "\K[0-9.]+' src/steadytranscribe/ui/updater.py)
          ISS=$(grep -oP '#define AppVersion "\K[0-9.]+' packaging/installer.iss)
          VI=$(grep -oP "StringStruct\('ProductVersion', '\K[0-9.]+" packaging/version_info.txt)
          echo "tag=$TAG updater=$PY iss=$ISS version_info=$VI"
          [ "$TAG" = "$PY" ] && [ "$TAG" = "$ISS" ] && [ "$TAG" = "$VI" ] || {
            echo "::error::Версии не совпадают — обновление у пользователей сломается"; exit 1; }
          # контракты (менять НЕЛЬЗЯ — сломаются обновления у всех установленных копий)
          grep -q '7E6B4A2D-9C31-4F5E-8D2A-4C7F1B9E3A60' packaging/installer.iss || {
            echo "::error::Изменён AppId — старые установки перестанут обновляться"; exit 1; }
          grep -q 'DefaultDirName={localappdata}\\Programs' packaging/installer.iss || {
            echo "::error::Изменена папка установки — сломает обновления"; exit 1; }
          grep -q 'PrivilegesRequired=lowest' packaging/installer.iss || {
            echo "::error::Убран per-user режим — обновления потребуют UAC"; exit 1; }
          echo "Контракты в порядке"

      - name: Lint — критичные ошибки (дубликаты функций, неопределённые имена)
        shell: bash
        run: |
          pip install pyflakes
          python -m pyflakes src/steadytranscribe > flakes.txt || true
          if grep -E "redefinition|undefined name" flakes.txt; then
            echo "::error::Критичная ошибка линтера — сборка остановлена (см. выше)"
            exit 1
          fi
          echo "Lint OK"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt pyinstaller

      - name: Download ffmpeg
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg-tmp
          New-Item -ItemType Directory -Force -Path dist-ffmpeg | Out-Null
          Copy-Item (Get-ChildItem ffmpeg-tmp -Recurse -Filter ffmpeg.exe | Select-Object -First 1).FullName dist-ffmpeg/
          Copy-Item (Get-ChildItem ffmpeg-tmp -Recurse -Filter ffprobe.exe | Select-Object -First 1).FullName dist-ffmpeg/

      - name: Build app (PyInstaller)
        run: pyinstaller packaging/steadytranscribe.spec --distpath dist

      - name: Bundle ffmpeg into app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/SteadyTranscribe/ffmpeg | Out-Null
          Copy-Item dist-ffmpeg/* dist/SteadyTranscribe/ffmpeg/
          # модели диаризации кладём рядом (путь diarization/ ожидает приложение)
          New-Item -ItemType Directory -Force -Path dist/SteadyTranscribe/diarization | Out-Null
          Copy-Item assets/diarization/* dist/SteadyTranscribe/diarization/

      - name: Build installer (лёгкий, без модели)
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" packaging\installer.iss

      # Публикуем ЛЁГКУЮ версию сразу — чтобы скачать обновление, не дожидаясь тяжёлой сборки
      - name: Attach light installer (сразу)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/Output/*.exe

      - name: Download base model (large-v3-turbo) for full installer
        shell: pwsh
        run: |
          $repo = "mobiuslabsgmbh/faster-whisper-large-v3-turbo"
          $dir = "model-bundle/large-v3-turbo"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          foreach ($f in @("config.json","model.bin","tokenizer.json","vocabulary.json","preprocessor_config.json")) {
            Invoke-WebRequest -Uri "https://huggingface.co/$repo/resolve/main/$f" -OutFile "$dir/$f"
          }
          # встроенная модель считается целой без метки (её собрали мы)

      - name: Build installer (полный, с моделью)
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DWITHMODEL packaging\installer.iss

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SteadyTranscribe-Setup
          path: packaging/Output/*.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/Output/*.exe
