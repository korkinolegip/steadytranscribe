name: Diagnose Windows Crash

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Install ffmpeg (bundle)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg-tmp
          New-Item -ItemType Directory -Force -Path dist-ffmpeg | Out-Null
          Copy-Item (Get-ChildItem ffmpeg-tmp -Recurse -Filter ffmpeg.exe | Select-Object -First 1).FullName dist-ffmpeg/
          Copy-Item (Get-ChildItem ffmpeg-tmp -Recurse -Filter ffprobe.exe | Select-Object -First 1).FullName dist-ffmpeg/

      - name: Build EXE (как в релизе)
        run: pyinstaller packaging/steadytranscribe.spec --distpath dist

      - name: Bundle ffmpeg + diarization into app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/SteadyTranscribe/ffmpeg | Out-Null
          Copy-Item dist-ffmpeg/* dist/SteadyTranscribe/ffmpeg/
          New-Item -ItemType Directory -Force -Path dist/SteadyTranscribe/diarization | Out-Null
          Copy-Item assets/diarization/* dist/SteadyTranscribe/diarization/

      - name: Generate test audio
        shell: pwsh
        run: dist/SteadyTranscribe/ffmpeg/ffmpeg.exe -f lavfi -i "sine=frequency=200:duration=6" -ar 16000 -ac 1 test.wav

      - name: Download tiny model (в %APPDATA%, откуда читает exe)
        shell: pwsh
        env:
          PYTHONPATH: src
        run: python -c "import threading; from steadytranscribe.core import models; models.download('tiny', lambda d,t: None, threading.Event()); print('tiny intact:', models.is_intact('tiny'))"

      - name: RUN EXE --selftest (реальная сборка, как у пользователя)
        shell: pwsh
        run: |
          Write-Host "=== Запуск собранного exe в режиме самотеста ==="
          & dist/SteadyTranscribe/SteadyTranscribe.exe --selftest (Resolve-Path test.wav)
          $code = $LASTEXITCODE
          Write-Host "=== EXIT CODE: $code ==="
          if ($code -ne 0) {
            Write-Host "=== crash.txt ==="
            Get-Content "$env:APPDATA\SteadyTranscribe\crash.txt" -ErrorAction SilentlyContinue
            Write-Host "=== log.txt ==="
            Get-Content "$env:APPDATA\SteadyTranscribe\log.txt" -ErrorAction SilentlyContinue
            exit $code
          }
